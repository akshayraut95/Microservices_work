server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cart_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    prefer-ip-address: true
    
